name: CI Pipeline - Airport App

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build-test-migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"

    steps:
      - name: 1. Checkout del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 3. Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Verificar formato con Black
        run: black --check .

      - name: 5. Verificar lint con Ruff
        run: ruff check .

      - name: 6. Ejecutar pruebas con Pytest
        run: |
          if [ -z "${JWT_SECRET_KEY}" ]; then
            export JWT_SECRET_KEY="ci-temporary-jwt-secret"
          fi
          python -m pytest tests/test_api_logic.py -q

      - name: 7. Definir si se ejecutan migraciones
        id: db_guard
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "DATABASE_URL no esta configurado en GitHub Secrets."
              echo "Configura el secreto DATABASE_URL para ejecutar migraciones y seeder."
              exit 1
            fi

            echo "skip_db_steps=true" >> "$GITHUB_OUTPUT"
            echo "Sin DATABASE_URL: se omiten migraciones y seeder para este evento."
          else
            echo "skip_db_steps=false" >> "$GITHUB_OUTPUT"
            echo "DATABASE_URL detectado: se ejecutaran migraciones y seeder."
          fi

      - name: 8. Aplicar migraciones (Alembic)
        if: steps.db_guard.outputs.skip_db_steps == 'false'
        run: alembic upgrade head

      - name: 9. Ejecutar seeder
        if: steps.db_guard.outputs.skip_db_steps == 'false'
        run: python -m app.database.seeder
